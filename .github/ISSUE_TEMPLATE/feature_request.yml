name: Feature request
description: Suggest an improvement for TrendPilot AI.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please keep requests aligned with public-data, license-safe, human-reviewed trend intelligence workflows.

  - type: dropdown
    id: area
    attributes:
      label: Feature area
      options:
        - Docs
        - Prompts
        - Templates
        - Workflows
        - Integrations
        - Schemas
        - Examples
        - Python examples
        - GitHub project files
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What problem would this feature solve?
      placeholder: Describe the user need or workflow gap.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature you want added.
      placeholder: Explain the proposed change.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional. Are there simpler or safer ways to solve this?
      placeholder: Describe alternatives if relevant.
    validations:
      required: false

  - type: dropdown
    id: risk-level
    attributes:
      label: Estimated risk level
      description: Use the project standard risk labels.
      options:
        - Low
        - Medium
        - High
        - Avoid
        - Unknown
    validations:
      required: true

  - type: textarea
    id: review
    attributes:
      label: Human review considerations
      description: What should a human reviewer check before using this feature?
      placeholder: List assumptions, limitations, or compliance concerns.
    validations:
      required: false

  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: This feature uses public or legally accessible information only.
          required: true
        - label: This feature does not require credentials, cookies, private data, or private user information.
          required: true
        - label: This feature does not promote spam, fake engagement, guaranteed profit, or deceptive automation.
          required: true
